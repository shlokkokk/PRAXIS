<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <filter id="superGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="18" result="blur1" />
      <feGaussianBlur stdDeviation="32" result="blur2" />
      <feMerge>
        <feMergeNode in="blur2" />
        <feMergeNode in="blur1" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <filter id="coreGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <linearGradient id="cyberGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f2ff" />
      <stop offset="50%" stop-color="#7000ff" />
      <stop offset="100%" stop-color="#ff007b" />
    </linearGradient>

    <linearGradient id="coreGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0066ff" />
      <stop offset="50%" stop-color="#00f2ff" />
      <stop offset="100%" stop-color="#ffffff" />
    </linearGradient>

    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffd700" />
      <stop offset="100%" stop-color="#ff3366" />
    </linearGradient>
  </defs>

  <rect width="512" height="512" fill="none" />

  <g filter="url(#superGlow)">
    <ellipse cx="256" cy="256" rx="145" ry="55" fill="none" stroke="url(#cyberGrad)" stroke-width="3" stroke-linecap="round" stroke-dasharray="120 40 180 60" transform="rotate(-30 256 256)" opacity="0.85" />
    <ellipse cx="256" cy="256" rx="125" ry="45" fill="none" stroke="url(#coreGrad)" stroke-width="2" stroke-dasharray="8 6" transform="rotate(30 256 256)" opacity="0.7" />

    <circle cx="380" cy="190" r="6" fill="#00f2ff" filter="url(#coreGlow)" />
    <circle cx="132" cy="322" r="6" fill="#ff007b" filter="url(#coreGlow)" />
  </g>

  <g filter="url(#coreGlow)">
    <polygon points="256,64 408,152 408,360 256,448 104,360 104,152" fill="#0c0e14" stroke="url(#cyberGrad)" stroke-width="4" stroke-linejoin="round" opacity="0.95" />

    <polygon points="256,104 374,172 374,340 256,408 138,340 138,172" fill="#06070a" stroke="url(#coreGrad)" stroke-width="2.5" stroke-linejoin="round" />

    <polygon points="256,150 334,196 334,316 256,362 178,316 178,196" fill="url(#cyberGrad)" opacity="0.25" />
    <polygon points="256,166 322,204 322,308 256,346 190,308 190,204" fill="none" stroke="url(#coreGrad)" stroke-width="1.5" />
  </g>

  <g stroke="url(#goldGrad)" stroke-width="2" opacity="0.9">
    <line x1="256" y1="64" x2="256" y2="24" />
    <line x1="408" y1="152" x2="458" y2="124" />
    <line x1="104" y1="152" x2="54" y2="124" />
  </g>

  <circle cx="256" cy="256" r="18" fill="#ffffff" filter="url(#coreGlow)" />
  <circle cx="256" cy="256" r="8" fill="#00f2ff" />

  <circle cx="256" cy="24" r="5" fill="#ffd700" filter="url(#coreGlow)" />
  <circle cx="458" cy="124" r="5" fill="#00f2ff" filter="url(#coreGlow)" />
  <circle cx="54" cy="124" r="5" fill="#ff007b" filter="url(#coreGlow)" />
</svg>
