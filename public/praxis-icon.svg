<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <radialGradient id="bg" cx="35%" cy="30%" r="75%">
      <stop offset="0%" stop-color="#111132"/>
      <stop offset="100%" stop-color="#060614"/>
    </radialGradient>
    <linearGradient id="brand" x1="50%" y1="100%" x2="50%" y2="0%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="50%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="ambient" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0.5 0 0.8 0 0   0 0 0.9 0 0   0 0.7 1 0 0   0 0 0 0.4 0"/>
    </filter>
    <clipPath id="squircle">
      <rect x="0" y="0" width="100" height="100" rx="22" ry="22"/>
    </clipPath>
  </defs>

  <rect x="0" y="0" width="100" height="100" rx="22" ry="22" fill="url(#bg)"/>
  <circle cx="20" cy="18" r="18" fill="#8b5cf6" opacity="0.04"/>
  <circle cx="80" cy="82" r="22" fill="#22d3ee" opacity="0.04"/>

  <g filter="url(#ambient)" clip-path="url(#squircle)">
    <polygon points="50,22 78,58 70,58 50,34 30,58 22,58" fill="#8b5cf6"/>
    <polygon points="50,44 78,80 70,80 50,56 30,80 22,80" fill="#22d3ee"/>
  </g>

  <polygon points="50,22 78,58 70,58 50,34 30,58 22,58" fill="url(#brand)" filter="url(#glow)" opacity="1"/>
  <polygon points="50,44 78,80 70,80 50,56 30,80 22,80" fill="url(#brand)" opacity="0.35"/>
</svg>
